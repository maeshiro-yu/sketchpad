<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SketchPad</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141414">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #141414;
    --canvas-bg: #1e1e1e;
    --ink: #e8e4da;
    --dot: rgba(232,228,218,0.2);
    --ui-bg: rgba(20,20,20,0.92);
    --ui-border: rgba(232,228,218,0.12);
    --accent: #e8724a;
    --btn-hover: rgba(232,228,218,0.06);
  }

  body.light {
    --bg: #f0ede6;
    --canvas-bg: #fafaf8;
    --ink: #1a1a2e;
    --dot: rgba(26,26,46,0.18);
    --ui-bg: rgba(240,237,230,0.92);
    --ui-border: rgba(26,26,46,0.12);
    --btn-hover: rgba(26,26,46,0.06);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    touch-action: none;
  }

  #canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    cursor: crosshair; touch-action: none;
  }

  body.eraser-mode #canvas { cursor: cell; }

  #toolbar {
    position: fixed; top: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 4px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 14px; padding: 6px 8px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    z-index: 100;
    transition: background 0.2s, border-color 0.2s;
  }

  .sep { width: 1px; height: 20px; background: var(--ui-border); margin: 0 4px; transition: background 0.2s; }

  .btn {
    width: 36px; height: 36px;
    border: none; background: transparent; border-radius: 9px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink); font-family: 'DM Mono', monospace; font-size: 13px;
    transition: background 0.15s, color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: var(--btn-hover); }
  .btn:active { transform: scale(0.9); }
  .btn.active { background: var(--ink); color: var(--canvas-bg); }
  .btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  #btn-copy { color: var(--accent); }
  #btn-copy svg { stroke: var(--accent); }

  #size-wrap { display: flex; align-items: center; gap: 6px; padding: 0 6px; }
  #size-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ink); transition: width 0.1s, height 0.1s, background 0.2s; flex-shrink: 0;
  }
  #size-slider {
    -webkit-appearance: none; appearance: none;
    width: 60px; height: 3px; background: var(--ui-border);
    border-radius: 2px; outline: none; cursor: pointer;
  }
  #size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--ink); cursor: pointer;
  }

  #eraser-indicator {
    position: fixed; border: 1.5px solid var(--accent); border-radius: 50%;
    pointer-events: none; opacity: 0; transition: opacity 0.1s;
    z-index: 50; transform: translate(-50%, -50%);
  }

  #preview-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 300; display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; padding: 24px;
  }
  #preview-overlay.show { display: flex; }
  #preview-label { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(232,228,218,0.5); letter-spacing: 0.06em; text-transform: uppercase; }
  #preview-img { max-width: 100%; max-height: 65vh; border-radius: 8px; border: 1px solid rgba(232,228,218,0.15); display: block; }
  #preview-close { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink); background: var(--ui-bg); border: 1px solid var(--ui-border); border-radius: 8px; padding: 10px 28px; cursor: pointer; -webkit-tap-highlight-color: transparent; }

  #toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--canvas-bg);
    font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 8px 16px; border-radius: 8px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap; z-index: 400;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="eraser-indicator"></div>

<div id="toolbar">
  <button class="btn active" id="btn-pen" title="ペン">
    <svg viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
  </button>
  <button class="btn" id="btn-eraser" title="消しゴム（パス単位）">
    <svg viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
  </button>

  <div class="sep"></div>

  <div id="size-wrap">
    <div id="size-dot"></div>
    <input type="range" id="size-slider" min="2" max="20" value="2">
  </div>

  <div class="sep"></div>

  <button class="btn" id="btn-undo" title="元に戻す">
    <svg viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
  </button>

  <button class="btn" id="btn-clear" title="クリア">
    <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>
  </button>

  <div class="sep"></div>

  <!-- 背景切り替え -->
  <button class="btn" id="btn-theme" title="背景切り替え">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v18" /><path d="M12 3a9 9 0 0 1 0 18Z" fill="currentColor" stroke="none"/></svg>
  </button>

  <div class="sep"></div>

  <button class="btn" id="btn-copy" title="共有">
    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>
</div>

<div id="preview-overlay">
  <div id="preview-label">長押しで共有</div>
  <img id="preview-img" src="" alt="preview">
  <button id="preview-close">閉じる</button>
</div>

<div id="toast"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const indicator = document.getElementById('eraser-indicator');
const previewOverlay = document.getElementById('preview-overlay');
const previewImg = document.getElementById('preview-img');

let mode = 'pen';
let brushSize = 2;
let isDrawing = false;
let currentStroke = null;
let isLight = false; // false=黒背景, true=白背景

let strokes = [];
let undoStack = [];

const ERASER_RADIUS = 8;
const PADDING = 20;
const DOT_SPACING = 24; // ドット間隔(px)
const DPR = window.devicePixelRatio || 1;

// --- テーマ設定 ---
function getBgColor() { return isLight ? '#fafaf8' : '#1e1e1e'; }
function getInkColor() { return isLight ? '#1a1a2e' : '#e8e4da'; }
function getDotColor() { return isLight ? 'rgba(26,26,46,0.18)' : 'rgba(232,228,218,0.2)'; }

// --- リサイズ ---
function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(DPR, DPR);
  redraw();
}

// --- ドット罫を描画 ---
function drawDots() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  ctx.fillStyle = getDotColor();
  const r = 1.2;
  for (let x = DOT_SPACING; x < w; x += DOT_SPACING) {
    for (let y = DOT_SPACING; y < h; y += DOT_SPACING) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// --- 全再描画 ---
function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = getBgColor();
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawDots();
  for (const stroke of strokes) drawStroke(stroke);
  if (currentStroke && currentStroke.points.length > 0) drawStroke(currentStroke);
}

// --- 1ストローク描画（メインcanvas用） ---
function drawStroke(stroke) { drawStrokeOn(ctx, stroke); }

// --- 1ストローク描画（任意のcontext用） ---
function drawStrokeOn(c, stroke) {
  const pts = stroke.points;
  if (pts.length === 0) return;
  c.beginPath();
  c.lineCap = 'round'; c.lineJoin = 'round';
  c.strokeStyle = getInkColor();
  c.fillStyle = getInkColor();

  if (pts.length === 1) {
    const r = Math.max(stroke.size * (0.5 + pts[0].pressure * 0.5) / 2, 1);
    c.arc(pts[0].x, pts[0].y, r, 0, Math.PI * 2);
    c.fill();
    return;
  }

  c.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const p = pts[i];
    c.lineWidth = stroke.size * (0.5 + p.pressure * 1.0);
    c.lineTo(p.x, p.y);
    c.stroke();
    c.beginPath();
    c.moveTo(p.x, p.y);
  }
}

// --- バウンディングボックス ---
function getBoundingBox() {
  if (strokes.length === 0) return null;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const stroke of strokes) {
    for (const p of stroke.points) {
      const halfW = stroke.size * 1.5;
      minX = Math.min(minX, p.x - halfW); minY = Math.min(minY, p.y - halfW);
      maxX = Math.max(maxX, p.x + halfW); maxY = Math.max(maxY, p.y + halfW);
    }
  }
  minX = Math.max(0, minX - PADDING); minY = Math.max(0, minY - PADDING);
  maxX = Math.min(window.innerWidth, maxX + PADDING);
  maxY = Math.min(window.innerHeight, maxY + PADDING);
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}

// --- トリミング（ドットなし） ---
function getCroppedDataURL() {
  const bb = getBoundingBox();
  if (!bb || bb.w <= 0 || bb.h <= 0) return canvas.toDataURL('image/png');
  const tmp = document.createElement('canvas');
  tmp.width = bb.w * DPR; tmp.height = bb.h * DPR;
  const tctx = tmp.getContext('2d');
  tctx.scale(DPR, DPR);
  // 背景のみ（ドットなし）
  tctx.fillStyle = getBgColor();
  tctx.fillRect(0, 0, bb.w, bb.h);
  // ストロークをオフセットして描画
  tctx.translate(-bb.x, -bb.y);
  for (const stroke of strokes) drawStrokeOn(tctx, stroke);
  return tmp.toDataURL('image/png');
}

// --- 座標取得 ---
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

// --- ヒットテスト ---
function distToSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - ax, py - ay);
  let t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function strokeHitTest(stroke, x, y, radius) {
  const pts = stroke.points;
  if (pts.length === 1) return Math.hypot(pts[0].x - x, pts[0].y - y) < radius;
  for (let i = 0; i < pts.length - 1; i++) {
    if (distToSegment(x, y, pts[i].x, pts[i].y, pts[i+1].x, pts[i+1].y) < radius) return true;
  }
  return false;
}

function eraseAt(x, y) {
  const before = strokes.length;
  strokes = strokes.filter(s => !strokeHitTest(s, x, y, ERASER_RADIUS));
  if (strokes.length !== before) redraw();
}

// --- ポインターイベント ---
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (e.pointerType !== 'pen') return;
  const pos = getPos(e);
  if (mode === 'eraser') {
    saveUndo(); isDrawing = true;
    showIndicator(pos.x, pos.y); eraseAt(pos.x, pos.y);
    return;
  }
  saveUndo(); isDrawing = true;
  const pressure = e.pressure > 0 ? e.pressure : 0.5;
  currentStroke = { size: brushSize, points: [{ x: pos.x, y: pos.y, pressure }] };
});

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (e.pointerType !== 'pen') return;
  const pos = getPos(e);
  if (mode === 'eraser' && isDrawing) {
    showIndicator(pos.x, pos.y); eraseAt(pos.x, pos.y); return;
  }
  if (!isDrawing) return;
  const pressure = e.pressure > 0 ? e.pressure : 0.5;
  currentStroke.points.push({ x: pos.x, y: pos.y, pressure });
  const pts = currentStroke.points;
  const i = pts.length - 2;
  if (i >= 0) {
    ctx.beginPath();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.strokeStyle = getInkColor();
    ctx.lineWidth = brushSize * (0.5 + pressure * 1.0);
    ctx.moveTo(pts[i].x, pts[i].y);
    ctx.lineTo(pts[i+1].x, pts[i+1].y);
    ctx.stroke();
  }
});

canvas.addEventListener('pointerup', endDraw);
canvas.addEventListener('pointercancel', endDraw);
canvas.addEventListener('pointerleave', e => { endDraw(e); hideIndicator(); });

function showIndicator(x, y) {
  indicator.style.left = x + 'px'; indicator.style.top = y + 'px';
  indicator.style.width = (ERASER_RADIUS * 2) + 'px';
  indicator.style.height = (ERASER_RADIUS * 2) + 'px';
  indicator.style.opacity = '0.7';
}
function hideIndicator() { indicator.style.opacity = '0'; }

function endDraw() {
  if (isDrawing && mode === 'pen' && currentStroke) {
    if (currentStroke.points.length > 0) strokes.push(currentStroke);
    currentStroke = null;
  }
  isDrawing = false; hideIndicator();
}

canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// --- Undo ---
function saveUndo() {
  undoStack.push([...strokes]);
  if (undoStack.length > 30) undoStack.shift();
}
function undo() {
  if (undoStack.length === 0) { toast('戻せる操作がありません'); return; }
  strokes = undoStack.pop(); redraw(); toast('1つ戻しました');
}

// --- UI ---
document.getElementById('btn-pen').addEventListener('click', () => setMode('pen'));
document.getElementById('btn-eraser').addEventListener('click', () => setMode('eraser'));

function setMode(m) {
  mode = m;
  document.getElementById('btn-pen').classList.toggle('active', m === 'pen');
  document.getElementById('btn-eraser').classList.toggle('active', m === 'eraser');
  document.body.classList.toggle('eraser-mode', m === 'eraser');
}

document.getElementById('btn-undo').addEventListener('click', undo);

document.getElementById('btn-clear').addEventListener('click', () => {
  saveUndo(); strokes = []; redraw(); toast('クリアしました');
});

// 背景切り替え
document.getElementById('btn-theme').addEventListener('click', () => {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  redraw();
});

const slider = document.getElementById('size-slider');
const dot = document.getElementById('size-dot');
slider.addEventListener('input', () => {
  brushSize = parseInt(slider.value);
  const s = Math.max(4, Math.min(20, brushSize * 0.7));
  dot.style.width = s + 'px'; dot.style.height = s + 'px';
});

// 共有
document.getElementById('btn-copy').addEventListener('click', async () => {
  if (strokes.length === 0) { toast('何も描かれていません'); return; }
  const dataURL = getCroppedDataURL();
  const res = await fetch(dataURL);
  const blob = await res.blob();
  const file = new File([blob], 'sketch.png', { type: 'image/png' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file] });
    } catch (e) {
      if (e.name !== 'AbortError') toast('共有に失敗しました');
    }
  } else {
    previewImg.src = dataURL;
    previewOverlay.classList.add('show');
  }
});

document.getElementById('preview-close').addEventListener('click', () => {
  previewOverlay.classList.remove('show'); previewImg.src = '';
});
previewOverlay.addEventListener('click', e => {
  if (e.target === previewOverlay) { previewOverlay.classList.remove('show'); previewImg.src = ''; }
});

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2000);
}

window.addEventListener('resize', resize);
resize();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
